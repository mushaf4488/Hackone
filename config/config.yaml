scanner:
  user_agent: "WebSecurityScanner/1.0 (Research Project)"
  timeout: 10
  max_threads: 10
  verify_ssl: false
  proxy: null

recon:
  ports: [21, 22, 23, 25, 53, 80, 110, 111, 135, 139, 143, 443, 445, 993, 995, 1723, 3306, 3389, 5900, 8080]
  subdomain_wordlist: "subdomains.txt"

crawler:
  max_depth: 3
  max_pages: 50

vulnerabilities:
  sqli_payloads: ["'", "\"", "1' OR '1'='1", "1\" OR \"1\"=\"1"]
  xss_payloads: ["<script>alert(1)</script>", "\"><script>alert(1)</script>"]

reporting:
  output_dir: "reports"
  formats: ["json", "html", "terminal"]
